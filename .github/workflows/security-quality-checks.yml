name: Security & Quality Checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: security-quality-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  # Ajuste se o frontend estiver em outro owner/nome de repositório.
  FRONTEND_REPOSITORY: ${{ github.repository_owner }}/multi-step-frontend

jobs:
  backend-quality:
    name: Code Quality (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Run Prettier check
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Run unit tests
        run: pnpm test -- --runInBand

      - name: Build backend
        run: pnpm build

  
  backend-security:
    name: Vulnerability Scan (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          cache: true
          version: v0.69.3

      - name: Run Trivy filesystem vulnerability scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          skip-setup-trivy: true
          format: table
          output: trivy-report.txt

      - name: Create or update vulnerability issue
        if: steps.trivy.outcome == 'failure' && github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'Trivy: vulnerabilidades HIGH/CRITICAL no backend';
            const report = fs.readFileSync('trivy-report.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `O scan do Trivy falhou no commit \`${context.sha}\`.`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              '```text',
              report.slice(0, 60000),
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

      - name: Fail job if vulnerabilities were found
        if: steps.trivy.outcome == 'failure'
        run: exit 1
