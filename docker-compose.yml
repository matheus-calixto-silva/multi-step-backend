services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: registration
      POSTGRES_PASSWORD: registration123
      POSTGRES_DB: registration_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U registration -d registration_db' ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
