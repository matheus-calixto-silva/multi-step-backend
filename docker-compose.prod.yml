services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-registration}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-registration123}
      POSTGRES_DB: ${DB_NAME:-registration_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-registration} -d ${DB_NAME:-registration_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${BACKEND_IMAGE:-ghcr.io/matheus-calixto-silva/multi-step-backend:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-registration}
      DB_PASSWORD: ${DB_PASSWORD:-registration123}
      DB_NAME: ${DB_NAME:-registration_db}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
